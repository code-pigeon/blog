- id: 3
  content: "还是得补充一下昨天下午看到组里的群聊，我们组其实是相对轻松的，这下一合并估计不好说了。因为研三不用干活，我也算是躲过一劫，太险了。

另外昨天在教务处做兼职的时候，本来想用工位电脑上校园网，想起来自己没有就想跟教务老师借，结果教务老师说“你们校园网不是分配的吗”，也算是给我整蒙了，老师还一直以为校园网是免费的，哪有这种好事呀。这世间的信息差还是太大了…"
