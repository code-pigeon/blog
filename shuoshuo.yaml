- id: 7
  content: "早上去超市买菜，看到￥6.58一斤的生菜，感觉有点贵，就拍了个价格想问问我妈这是不是贵了。拍完还想着继续逛呢，只觉得耳边突然嘈杂了些，然后看到柜台边一个服务员一直在看我，嘴里好像念叨着些什么。我此时还没发现问题，转头继续逛。然后就看到另一个服务员继续是呵斥地说一些“你为什么拍照”之类的话。我才反应过来，问她怎么了，拍照有什么问题吗，她斩钉截铁说有问题，但也不说原因，就拼了命地谴责我。我哭笑不得，最后笑着拿着手机跟她说我删给你看，然后跟她解释了缘由，说我只是想问我妈妈这个价位正常吗，她一听到“妈妈”两个字，狰狞的面目就消失了，语气也软了下来。我说我不懂为什么不能拍这个，她说因为附近很多超市都跑来这里比价，所以老板交代她们看到有人拍照就要说。大姐也是执行得真到位。感觉还是年轻了，不接地气，根本不知道市井里的这些事。"
  date: "25-11-11 10:37"
  images: 
  mood: "🤔"

