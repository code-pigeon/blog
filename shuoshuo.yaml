  content: "今天居然在教务处忙活了一天。我还是逃不过那个早起前一天失眠定律，教务老师预定了今天让我去帮忙，于是我心里也有数，设了个八点多的闹钟，然后就莫名其妙两点还没睡着，早上赶过去，以为还快就能干完活，没想到干到了晚上六点，感觉一天就这么被偷走了，满身怨气，受不了了，明天还得接着干。"
