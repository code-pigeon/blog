- id: 10
  content: "今天又有点被震惊到了。在办公室帮老师扫描文件，那个文件里的内容有个边框，我拍照片时把整页纸都拍进去了，然后扫描时也没有把边框外面的空白部分截掉。老师拿到扫描后的图片，插入到word里面，因为边框外面的空白部分太多，她觉得这样不好，于是问我能不能边框外面的空白搞少一点。我说可以，说直接在word里面截也是一样的。此时我还不觉得有什么问题。结果她过了一会儿又说，能不能把下面的页码也给截掉。我开始意识到了什么，跟她说word里面能直接截图的，她还是不知道我在说什么。我于是过去她电脑前演示给她看。她学会之后很开心，说又学了一招。我是实在没想到，她作为一个工作了至少7年的办公人员，居然会不知道word里的图片是可以直接截图的……"
  date: "25-12-05 21:12"
  images: 
  mood: "🤐"

